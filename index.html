<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目周期管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day {
            min-height: 80px; border-radius: 8px; background: white; border: 1px solid #e2e8f0;
            padding: 4px; position: relative;
        }
        .calendar-day.weekend { background: #f8fafc; }
    </style>
</head>
<body class="text-slate-800">
    <nav class="bg-white border-b p-4">
        <div class="max-w-7xl mx-auto flex justify-between">
            <h1 class="text-xl font-bold text-indigo-600">项目周期管理系统</h1>
            <span class="text-sm text-slate-500">v1.0</span>
        </div>
    </nav>
    
    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r p-4">
            <h3 class="font-bold text-sm text-slate-500 mb-2">项目经理</h3>
            <div class="space-y-1 text-sm">
                <div class="p-2 bg-indigo-50 rounded">刘絮</div>
                <div class="p-2 bg-slate-50 rounded">Huan</div>
                <div class="p-2 bg-slate-50 rounded">潘潘</div>
                <div class="p-2 bg-slate-50 rounded">Kathy</div>
                <div class="p-2 bg-slate-50 rounded">思璇</div>
                <div class="p-2 bg-slate-50 rounded">Miles</div>
            </div>
            
            <h3 class="font-bold text-sm text-slate-500 mt-4 mb-2">客户负责人</h3>
            <div class="space-y-1 text-sm">
                <div class="p-2 bg-pink-50 rounded">刘絮</div>
                <div class="p-2 bg-pink-50 rounded">Huan</div>
                <div class="p-2 bg-pink-50 rounded">Daizy</div>
            </div>
        </aside>
        
        <main class="flex-1 p-6">
            <h2 class="text-2xl font-bold mb-4">2026年4月</h2>
            <div class="grid grid-cols-7 gap-2 mb-2 text-center text-sm font-semibold">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div class="calendar-grid" id="calendar"></div>
        </main>
    </div>
    
    <script>
        // 生成月历
        const calendar = document.getElementById('calendar');
        for (let i = 0; i < 35; i++) {
            const day = document.createElement('div');
            day.className = 'calendar-day';
            day.innerHTML = `<div class="text-xs text-slate-400">${i + 1}</div>`;
            calendar.appendChild(day);
        }
    </script>
</body>
</html>
