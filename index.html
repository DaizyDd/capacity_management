<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目周期管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day {
            min-height: 70px; border-radius: 8px; background: white; border: 1px solid #e2e8f0;
            padding: 4px; position: relative; font-size: 12px;
        }
        .calendar-day.weekend { background: #f8fafc; }
        .phase-pill { font-size: 9px; padding: 1px 4px; border-radius: 3px; color: white; margin: 1px 0; }
        .phase-proposal { background: #f59e0b; }
        .phase-preparation { background: #3b82f6; }
        .phase-sprint { background: #ef4444; }
        .workload-badge {
            position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; color: white; background: #10b981;
        }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 50; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 16px; border-radius: 12px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .checkbox-item { display: flex; align-items: center; gap: 4px; padding: 6px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .checkbox-item.selected { background: #d1fae5; }
        .role-tag { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; margin: 2px; }
        .role-pm { background: #dbeafe; color: #1e40af; }
        .role-client { background: #fce7f3; color: #9d174d; }
        .role-support { background: #d1fae5; color: #065f46; }
        .project-item { position: relative; }
        .delete-btn { position: absolute; right: 4px; top: 4px; color: #ef4444; font-size: 12px; cursor: pointer; padding: 2px 6px; }
        .delete-btn:hover { background: #fee2e2; border-radius: 4px; }
        .sync-status { cursor: pointer; }
        .sync-status:hover { text-decoration: underline; }
    </style>
</head>
<body class="text-slate-800">

<nav class="bg-white border-b p-3 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-lg font-bold text-indigo-600">项目周期管理</h1>
        <div class="flex gap-2">
            <button onclick="openModal()" class="px-3 py-1.5 bg-indigo-600 text-white rounded text-sm">+ 项目</button>
            <button onclick="exportData()" class="px-3 py-1.5 bg-green-500 text-white rounded text-sm">导出</button>
            <label class="px-3 py-1.5 bg-blue-500 text-white rounded text-sm cursor-pointer">
                导入
                <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(this)">
            </label>
            <button onclick="syncToCloud()" class="px-3 py-1.5 bg-purple-500 text-white rounded text-sm" title="保存到仓库">同步</button>
            <button onclick="clearAllData()" class="px-3 py-1.5 bg-red-500 text-white rounded text-sm">清空</button>
        </div>
    </div>
</nav>

<div class="flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-white border-b md:border-b-0 md:border-r p-3">
        <div class="mb-4">
            <div class="text-xs font-bold text-slate-400 mb-2">项目经理</div>
            <div id="pmList" class="space-y-1"></div>
        </div>
        <div class="mb-4">
            <div class="text-xs font-bold text-slate-400 mb-2">客户负责人</div>
            <div id="clientList" class="space-y-1"></div>
        </div>
        <div class="mb-4">
            <div class="text-xs font-bold text-slate-400 mb-2">项目支持</div>
            <div id="supportList" class="space-y-1"></div>
        </div>
        <div class="p-2 bg-slate-50 rounded text-xs">
            <div class="font-bold mb-1">阶段说明</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-amber-500 rounded-full"></span>方案 50%</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-500 rounded-full"></span>准备 30-50%</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-red-500 rounded-full"></span>冲击 80%</div>
        </div>
        <div class="mt-2 text-xs text-slate-400 flex justify-between">
            <span id="saveStatus">数据已自动保存</span>
            <span id="cloudStatus" class="sync-status" onclick="loadFromCloud()">☁️ 检查云端</span>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-3">
        <div class="flex justify-between items-center mb-3">
            <h2 id="currentMonth" class="text-lg font-bold">2026年4月</h2>
            <div class="flex gap-1">
                <button onclick="changeMonth(-1)" class="px-2 py-1 border rounded text-sm">←</button>
                <button onclick="changeMonth(1)" class="px-2 py-1 border rounded text-sm">→</button>
            </div>
        </div>
        <div class="grid grid-cols-7 gap-1 mb-1 text-center text-xs font-semibold text-slate-500">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div id="calendar" class="calendar-grid"></div>
    </main>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-lg font-bold">添加项目</h3>
            <button onclick="closeModal()" class="text-slate-400 text-xl">&times;</button>
        </div>
        
        <div class="space-y-3">
            <input type="text" id="projName" placeholder="项目名称" class="w-full border rounded px-3 py-2 text-sm">
            
            <div class="grid grid-cols-2 gap-2">
                <select id="projPM" class="border rounded px-2 py-2 text-sm"></select>
                <select id="projClient" class="border rounded px-2 py-2 text-sm"></select>
            </div>
            
            <div>
                <div class="text-xs font-bold mb-1">项目支持（多选）</div>
                <div id="supportCheckboxes" class="checkbox-grid border rounded p-2"></div>
                <div id="supportCount" class="text-xs text-slate-500 mt-1">已选: 0人</div>
            </div>
            
            <div class="bg-amber-50 p-2 rounded border border-amber-200">
                <div class="text-xs font-bold text-amber-800 mb-1">方案阶段 50%</div>
                <div class="flex gap-2">
                    <input type="date" id="p1Start" class="flex-1 border rounded px-2 py-1 text-xs">
                    <input type="date" id="p1End" class="flex-1 border rounded px-2 py-1 text-xs">
                </div>
            </div>
            
            <div class="bg-blue-50 p-2 rounded border border-blue-200">
                <div class="text-xs font-bold text-blue-800 mb-1">准备阶段</div>
                <div class="flex gap-2 mb-1">
                    <input type="date" id="p2Start" class="flex-1 border rounded px-2 py-1 text-xs">
                    <input type="date" id="p2End" class="flex-1 border rounded px-2 py-1 text-xs">
                </div>
                <select id="p2Load" class="w-full border rounded px-2 py-1 text-xs">
                    <option value="30">30%</option>
                    <option value="40" selected>40%</option>
                    <option value="50">50%</option>
                </select>
            </div>
            
            <div class="bg-red-50 p-2 rounded border border-red-200">
                <div class="text-xs font-bold text-red-800 mb-1">冲击阶段 80%</div>
                <div class="flex gap-2">
                    <input type="date" id="p3Start" class="flex-1 border rounded px-2 py-1 text-xs">
                    <input type="date" id="p3End" class="flex-1 border rounded px-2 py-1 text-xs">
                </div>
            </div>
        </div>
        
        <div class="flex gap-2 mt-4">
            <button onclick="closeModal()" class="flex-1 py-2 border rounded text-sm">取消</button>
            <button onclick="saveProject()" class="flex-1 py-2 bg-indigo-600 text-white rounded text-sm">保存</button>
        </div>
    </div>
</div>

<script>
const pmList = ['刘絮', 'Huan', '潘潘', 'Kathy', '思璇', 'Miles'];
const clientList = ['刘絮', 'Huan', 'Daizy'];
const supportList = ['刘絮', 'Huan', '潘潘', 'Kathy', '思璇', 'Miles', 'Daizy'];

let projects = [];
let currentDate = new Date(2026, 3, 1);
let selectedPerson = pmList[0];
let selectedRole = 'pm';
let selectedSupports = [];
const STORAGE_KEY = 'pm_data_v8';
const CLOUD_FILE = 'data.json'; // 云端数据文件名

function formatDate(d) {
    if (typeof d === 'string') return d;
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

// ========== A. 自动加载云端数据 ==========
function init() {
    // 先加载本地数据
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            projects = data.projects || [];
        } catch (e) {}
    }
    
    renderPersonLists();
    renderCalendar();
    updateModal();
    
    // 然后检查云端是否有更新
    checkCloudData();
}

// 检查云端数据
function checkCloudData() {
    showCloudStatus('☁️ 检查中...', 'text-blue-500');
    
    fetch(CLOUD_FILE + '?t=' + Date.now()) // 加时间戳防止缓存
        .then(r => {
            if (!r.ok) throw new Error('无云端数据');
            return r.json();
        })
        .then(data => {
            if (!data.projects || data.projects.length === 0) {
                showCloudStatus('☁️ 云端为空', 'text-slate-400');
                return;
            }
            
            const cloudCount = data.projects.length;
            const localCount = projects.length;
            const cloudTime = data.savedAt ? new Date(data.savedAt).toLocaleString() : '未知';
            
            showCloudStatus(`☁️ 云端有${cloudCount}个项目`, 'text-green-600');
            
            // 如果云端数据更新，提示加载
            if (cloudCount !== localCount) {
                if (confirm(`发现云端备份（${cloudCount}个项目，${cloudTime}）\n\n是否加载云端数据？\n（将覆盖本地${localCount}个项目）`)) {
                    projects = data.projects;
                    saveToStorage();
                    renderPersonLists();
                    renderCalendar();
                    showStatus('已加载云端数据');
                }
            }
        })
        .catch(err => {
            showCloudStatus('☁️ 点击同步', 'text-slate-400');
            console.log('云端检查:', err.message);
        });
}

// 手动加载云端
function loadFromCloud() {
    if (!confirm('将从云端加载数据，覆盖本地内容，继续吗？')) return;
    
    showCloudStatus('☁️ 加载中...', 'text-blue-500');
    
    fetch(CLOUD_FILE + '?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            projects = data.projects || [];
            saveToStorage();
            renderPersonLists();
            renderCalendar();
            showCloudStatus('☁️ 已同步', 'text-green-600');
            showStatus('云端数据已加载');
        })
        .catch(err => {
            alert('加载失败：' + err.message);
            showCloudStatus('☁️ 加载失败', 'text-red-500');
        });
}

// ========== A. 同步到云端（下载JSON手动上传） ==========
function syncToCloud() {
    if (projects.length === 0) {
        alert('没有项目可同步');
        return;
    }
    
    const data = {
        projects: projects,
        savedAt: new Date().toISOString(),
        savedBy: 'admin',
        version: '1.0'
    };
    
    // 生成文件供手动上传
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = CLOUD_FILE;
    a.click();
    URL.revokeObjectURL(url);
    
    showStatus('文件已下载，请上传到GitHub仓库');
    
    // 显示上传指引
    setTimeout(() => {
        alert('同步步骤：\n1. 文件已下载为 data.json\n2. 访问 github.com/daizydd/capacity-management\n3. 点击 "Add file" → "Upload files"\n4. 上传 data.json 并 Commit\n5. 其他人刷新网页即可看到');
    }, 500);
}

function showCloudStatus(text, colorClass) {
    const el = document.getElementById('cloudStatus');
    el.textContent = text;
    el.className = 'sync-status ' + colorClass;
}

function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        projects: projects,
        savedAt: new Date().toISOString()
    }));
    showStatus('已自动保存');
}

function showStatus(msg) {
    const el = document.getElementById('saveStatus');
    el.textContent = msg;
    el.style.color = '#10b981';
    setTimeout(() => {
        el.style.color = '#9ca3af';
        el.textContent = '数据已自动保存';
    }, 2000);
}

function renderPersonLists() {
    document.getElementById('pmList').innerHTML = pmList.map(p => `
        <div onclick="selectPerson('${p}', 'pm')" class="project-item p-2 rounded cursor-pointer text-sm ${p === selectedPerson && selectedRole === 'pm' ? 'bg-indigo-100 border border-indigo-500' : 'bg-slate-50'}">
            ${p} <span class="text-xs text-slate-400">${getLoad(p, 'pm')}%</span>
            ${renderPersonProjects(p, 'pm')}
        </div>
    `).join('');
    
    document.getElementById('clientList').innerHTML = clientList.map(p => `
        <div onclick="selectPerson('${p}', 'client')" class="project-item p-2 rounded cursor-pointer text-sm ${p === selectedPerson && selectedRole === 'client' ? 'bg-pink-100 border border-pink-500' : 'bg-slate-50'}">
            ${p} <span class="text-xs text-slate-400">${getLoad(p, 'client')}%</span>
            ${renderPersonProjects(p, 'client')}
        </div>
    `).join('');
    
    document.getElementById('supportList').innerHTML = supportList.map(p => `
        <div onclick="selectPerson('${p}', 'support')" class="project-item p-2 rounded cursor-pointer text-sm ${p === selectedPerson && selectedRole === 'support' ? 'bg-green-100 border border-green-500' : 'bg-slate-50'}">
            ${p} <span class="text-xs text-slate-400">${getLoad(p, 'support')}%</span>
            ${renderPersonProjects(p, 'support')}
        </div>
    `).join('');
}

function renderPersonProjects(person, role) {
    let personProjects = [];
    if (role === 'pm') {
        personProjects = projects.filter(p => p.pm === person);
    } else if (role === 'client') {
        personProjects = projects.filter(p => p.client === person);
    } else {
        personProjects = projects.filter(p => p.supports && p.supports.includes(person));
    }
    
    if (personProjects.length === 0) return '';
    
    return '<div class="mt-1 space-y-1">' + personProjects.map(p => `
        <div class="bg-white p-1.5 rounded text-xs border flex justify-between items-center">
            <span class="truncate flex-1">${p.name}</span>
            <span class="delete-btn" onclick="event.stopPropagation(); deleteProject(${p.id})">×</span>
        </div>
    `).join('') + '</div>';
}

function deleteProject(id) {
    if (!confirm('确定删除这个项目吗？')) return;
    projects = projects.filter(p => p.id !== id);
    saveToStorage();
    renderPersonLists();
    renderCalendar();
    showStatus('项目已删除');
}

function clearAllData() {
    if (!confirm('确定清空所有项目吗？')) return;
    if (!confirm('再次确认：将删除所有 ' + projects.length + ' 个项目？')) return;
    projects = [];
    localStorage.removeItem(STORAGE_KEY);
    renderPersonLists();
    renderCalendar();
    showStatus('所有数据已清空');
}

function getLoad(person, role) {
    let total = 0, count = 0;
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        if (date.getDay() === 0 || date.getDay() === 6) continue;
        const load = getDayLoad(date, person, role);
        total += load;
        count++;
    }
    return count > 0 ? Math.round(total / count) : 0;
}

function getDayLoad(date, person, role) {
    const dateStr = formatDate(date);
    let load = 0;
    projects.forEach(p => {
        let match = false;
        if (role === 'pm' && p.pm === person) match = true;
        else if (role === 'client' && p.client === person) match = true;
        else if (role === 'support' && p.supports && p.supports.includes(person)) match = true;
        
        if (!match) return;
        
        Object.values(p.phases).forEach(phase => {
            if (dateStr >= phase.start && dateStr <= phase.end) load += phase.load;
        });
    });
    return load;
}

function selectPerson(p, role) {
    selectedPerson = p;
    selectedRole = role;
    renderPersonLists();
    renderCalendar();
}

function changeMonth(delta) {
    currentDate.setMonth(currentDate.getMonth() + delta);
    renderCalendar();
    renderPersonLists();
}

function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('calendar');
    grid.innerHTML = '';
    
    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(createDay(0, null, true));
    }
    
    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        grid.appendChild(createDay(d, date, false));
    }
}

function createDay(day, date, empty) {
    const div = document.createElement('div');
    if (empty) {
        div.className = 'calendar-day bg-slate-50';
        return div;
    }
    
    const load = getDayLoad(date, selectedPerson, selectedRole);
    const dayProjects = getDayProjects(date, selectedPerson, selectedRole);
    
    div.className = 'calendar-day' + (date.getDay() === 0 || date.getDay() === 6 ? ' weekend' : '');
    div.innerHTML = `
        <div class="font-bold text-xs ${date.getDate() === new Date().getDate() ? 'text-indigo-600' : ''}">${day}</div>
        ${load > 0 ? `<div class="workload-badge ${load > 100 ? 'bg-red-500' : load > 60 ? 'bg-amber-500' : ''}">${load}</div>` : ''}
        <div class="mt-1">
            ${dayProjects.slice(0, 2).map(p => `
                <div class="phase-pill ${p.phase === 'proposal' ? 'phase-proposal' : p.phase === 'preparation' ? 'phase-preparation' : 'phase-sprint'}">${p.name.substring(0, 3)}</div>
            `).join('')}
        </div>
    `;
    return div;
}

function getDayProjects(date, person, role) {
    const dateStr = formatDate(date);
    const list = [];
    projects.forEach(p => {
        let match = false;
        if (role === 'pm' && p.pm === person) match = true;
        else if (role === 'client' && p.client === person) match = true;
        else if (role === 'support' && p.supports && p.supports.includes(person)) match = true;
        
        if (!match) return;
        
        Object.entries(p.phases).forEach(([phaseName, phase]) => {
            if (dateStr >= phase.start && dateStr <= phase.end) {
                list.push({ name: p.name, phase: phaseName, load: phase.load });
            }
        });
    });
    return list;
}

function openModal() {
    document.getElementById('modal').classList.add('active');
    selectedSupports = [];
    renderSupportCheckboxes();
    
    const today = new Date();
    document.getElementById('p1Start').value = formatDate(today);
    document.getElementById('p1End').value = formatDate(new Date(today.getTime() + 14 * 86400000));
    document.getElementById('p2Start').value = formatDate(new Date(today.getTime() + 15 * 86400000));
    document.getElementById('p2End').value = formatDate(new Date(today.getTime() + 45 * 86400000));
    document.getElementById('p3Start').value = formatDate(new Date(today.getTime() + 46 * 86400000));
    document.getElementById('p3End').value = formatDate(new Date(today.getTime() + 60 * 86400000));
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('projName').value = '';
}

function updateModal() {
    document.getElementById('projPM').innerHTML = pmList.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById('projClient').innerHTML = clientList.map(p => `<option value="${p}">${p}</option>`).join('');
}

function renderSupportCheckboxes() {
    const container = document.getElementById('supportCheckboxes');
    container.innerHTML = supportList.map(person => `
        <div class="checkbox-item ${selectedSupports.includes(person) ? 'selected' : ''}" onclick="toggleSupport('${person}')">
            <input type="checkbox" ${selectedSupports.includes(person) ? 'checked' : ''} onclick="event.stopPropagation()">
            <span>${person}</span>
        </div>
    `).join('');
    document.getElementById('supportCount').textContent = `已选: ${selectedSupports.length}人`;
}

function toggleSupport(person) {
    if (selectedSupports.includes(person)) {
        selectedSupports = selectedSupports.filter(p => p !== person);
    } else {
        selectedSupports.push(person);
    }
    renderSupportCheckboxes();
}

function saveProject() {
    const name = document.getElementById('projName').value.trim();
    if (!name) { alert('请输入项目名称'); return; }
    
    const newProject = {
        id: Date.now(),
        name: name,
        pm: document.getElementById('projPM').value,
        client: document.getElementById('projClient').value,
        supports: selectedSupports.length > 0 ? selectedSupports : null,
        phases: {
            proposal: { start: document.getElementById('p1Start').value, end: document.getElementById('p1End').value, load: 50 },
            preparation: { start: document.getElementById('p2Start').value, end: document.getElementById('p2End').value, load: parseInt(document.getElementById('p2Load').value) },
            sprint: { start: document.getElementById('p3Start').value, end: document.getElementById('p3End').value, load: 80 }
        }
    };
    
    projects.push(newProject);
    saveToStorage();
    closeModal();
    renderPersonLists();
    renderCalendar();
    showStatus('项目添加成功！点击"同步"上传到云端');
}

function importData(input) {
    const file = input.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            const projectCount = data.projects?.length || 0;
            
            if (projectCount === 0) {
                alert('文件中没有项目数据');
                return;
            }
            
            if (confirm(`确定导入 ${projectCount} 个项目吗？`)) {
                projects = data.projects;
                saveToStorage();
                renderPersonLists();
                renderCalendar();
                showStatus(`成功导入 ${projectCount} 个项目`);
            }
        } catch (err) {
            alert('文件格式错误：' + err.message);
        }
    };
    reader.readAsText(file);
    input.value = '';
}

function exportData() {
    const data = { 
        projects: projects, 
        savedAt: new Date().toISOString(),
        version: '1.0'
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `备份_${formatDate(new Date())}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showStatus('导出成功');
}

init();
</script>

</body>
